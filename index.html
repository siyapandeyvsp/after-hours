<body>
<div id="grain"></div>
<div id="app">
  <div id="landing">
    <div class="brand">
      <div class="brand-name">After Hours</div>
    </div>
    <div class="vinyl-stage" id="vinyl-stage" onclick="startExperience()">
      <div class="vinyl-outer" id="main-vinyl">
        <div class="vinyl-grooves"></div>
        <div class="vinyl-reflection"></div>
        <div class="vinyl-label">
          <div class="vinyl-label-text">AH</div>
          <div class="vinyl-hole"></div>
        </div>
      </div>
      <div class="tonearm" id="tonearm">
        <div class="tonearm-pivot"></div>
        <div class="tonearm-body"></div>
        <div class="tonearm-head"></div>
        <div class="tonearm-needle"></div>
      </div>
    </div>
    <div class="landing-question">Who are you<br><em>after hours?</em></div>

  </div>

  <div id="quiz">
    <div class="quiz-top">
      <div>
        <div class="track-label" id="track-num">Track 01</div>
        <div class="side-label" id="side-label">Side A</div>
      </div>
    </div>

      <div class="mini-vinyl-grooves"></div>
      <div class="mini-vinyl-label"><div class="mini-vinyl-hole"></div></div>
    </div>

    </div>
  </div>

      <div class="antic-vinyl" id="antic-vinyl">
        <div class="antic-grooves"></div>
        <div class="antic-label"><div class="antic-hole"></div></div>
      </div>
      <div class="antic-tonearm" id="antic-tonearm">
        <div class="antic-tonearm-body"></div>

<script>
// ─────────────────────────────────────────────
// AUDIO ENGINE — ambient vinyl sound design only.
// No music playback, no external audio files. Everything below is
// synthesised with the Web Audio API: tape hiss, crackle, a needle
// drop, and a soft tactile click for taps.
// ─────────────────────────────────────────────
let audioCtx = null, muted = false, ambientNodes = null;

function getAudioCtx(){
  if(!audioCtx) audioCtx = new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function toggleMute(){
  muted = !muted;
  document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔊';
  if(muted) stopAmbient(); else startAmbient();
}
function click(freq=900,vol=0.035,dur=0.05){
  if(muted) return;
  try{
    const c=getAudioCtx(), g=c.createGain(), o=c.createOscillator();
    g.gain.setValueAtTime(vol,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0008,c.currentTime+dur);
    o.type='triangle'; o.frequency.setValueAtTime(freq,c.currentTime);
    o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime+dur);
  }catch(e){}
}
function crackle(v=0.05){
  if(muted) return;
  try{
    const c=getAudioCtx(), buf=c.createBuffer(1,c.sampleRate*0.25,c.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*v*Math.exp(-i/6000);
    const s=c.createBufferSource(), g=c.createGain();
    g.gain.value=v; s.buffer=buf; s.connect(g); g.connect(c.destination); s.start();
  }catch(e){}
}
function needleDrop(){
  if(muted) return;
  try{
    const c=getAudioCtx(), g=c.createGain(), o=c.createOscillator();
    g.gain.setValueAtTime(0,c.currentTime);
    g.gain.linearRampToValueAtTime(0.16,c.currentTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.45);
    o.frequency.value=55; o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime+0.45);
    [40,110,190].forEach((t,i)=>setTimeout(()=>crackle([0.09,0.05,0.03][i]),t));
  }catch(e){}
}
// Continuous, very quiet vinyl hiss + occasional crackle pops — the
// atmosphere bed that plays for the duration of the experience.
function startAmbient(){
  if(muted || ambientNodes) return;
  try{
    const c=getAudioCtx();
    const bufLen=c.sampleRate*2;
    const buf=c.createBuffer(1,bufLen,c.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<bufLen;i++) d[i]=Math.random()*2-1;
    const src=c.createBufferSource(); src.buffer=buf; src.loop=true;
    const hp=c.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=2200;
    const lp=c.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=8000;
    const g=c.createGain(); g.gain.value=0.012;
    src.connect(hp); hp.connect(lp); lp.connect(g); g.connect(c.destination);
    src.start();
    const popId=setInterval(()=>{ if(!muted && Math.random()<0.4) crackle(0.018); },1400);
    ambientNodes={src,g,popId};
  }catch(e){}
}
function stopAmbient(){
  if(!ambientNodes) return;
  try{ ambientNodes.src.stop(); }catch(e){}
  clearInterval(ambientNodes.popId);
  ambientNodes=null;
}

// ─────────────────────────────────────────────
// PROCEDURAL SLEEVE ART — every artist gets a unique, hand-art-directed
// album sleeve built from layout + palette + typeface, not a photo.
// Deterministic per name so the same artist always renders the same way.
// ─────────────────────────────────────────────
function seedOf(str){ let h=0; for(let i=0;i<str.length;i++){ h=(h<<5)-h+str.charCodeAt(i); h|=0; } return Math.abs(h); }
function rand(seed){ const x=Math.sin(seed)*10000; return x-Math.floor(x); }
const FONT_STACKS={
  serif:"'Playfair Display',serif",
  'serif-italic':"'Cormorant',serif",
  condensed:"'Bodoni Moda',serif",
  mono:"'Big Shoulders Display',sans-serif",
};

function sleeveSVG(artist){
  const seed=seedOf(artist.name);
  const r1=rand(seed+1), r2=rand(seed+2), r3=rand(seed+3), r4=rand(seed+4);
  const dark=artist.art, accent=artist.color, light=lighten(accent,90);
  const initial=artist.name.trim()[0].toUpperCase();
  const font=FONT_STACKS[artist.sleeve.font]||FONT_STACKS.serif;
  const rot=(r1*6-3).toFixed(1);
  let body='';

  if(artist.sleeve.layout==='typographic'){
    body=`
      <rect width="600" height="600" fill="${dark}"/>
      <text x="${300+ (r2*40-20)}" y="${420}" font-family="${font}" font-weight="900" font-size="480" fill="${accent}" fill-opacity="0.22" text-anchor="middle">${initial}</text>
      <g transform="rotate(${rot} 300 300)">
        <text x="300" y="330" font-family="${font}" font-weight="700" font-size="46" fill="${light}" text-anchor="middle" letter-spacing="1">${artist.name}</text>
      </g>
      <line x1="60" y1="540" x2="540" y2="540" stroke="${light}" stroke-opacity="0.35" stroke-width="1"/>
      <text x="60" y="565" font-family="'Space Mono',monospace" font-size="14" letter-spacing="3" fill="${light}" fill-opacity="0.55">${artist.catalog}</text>
    `;
  } else if(artist.sleeve.layout==='halftone'){
    let dots='';
    for(let y=20;y<600;y+=22){
      for(let x=20;x<600;x+=22){
        const dx=x-300, dy=y-300, d=Math.sqrt(dx*dx+dy*dy)/300;
        const rr=Math.max(1.2,9*(1-d)*(0.6+rand(seed+x*3+y)*0.5));
        if(rr>1.2) dots+=`<circle cx="${x}" cy="${y}" r="${rr.toFixed(1)}" fill="${accent}" fill-opacity="0.55"/>`;
      }
    }
    body=`
      <rect width="600" height="600" fill="${dark}"/>
      <g>${dots}</g>
      <text x="300" y="300" font-family="${font}" font-size="120" text-anchor="middle" dominant-baseline="middle">${artist.emoji}</text>
      <text x="40" y="555" font-family="'Space Mono',monospace" font-size="13" letter-spacing="3" fill="${light}" fill-opacity="0.6">${artist.name.toUpperCase()}</text>
      <text x="560" y="555" font-family="'Space Mono',monospace" font-size="13" letter-spacing="2" fill="${light}" fill-opacity="0.4" text-anchor="end">${artist.catalog}</text>
    `;
  } else if(artist.sleeve.layout==='frame'){
    body=`
      <rect width="600" height="600" fill="${dark}"/>
      <rect x="34" y="34" width="532" height="532" fill="none" stroke="${light}" stroke-opacity="0.5" stroke-width="1.5"/>
      <rect x="50" y="50" width="500" height="500" fill="none" stroke="${light}" stroke-opacity="0.25" stroke-width="0.75"/>
      <circle cx="300" cy="280" r="130" fill="${accent}" fill-opacity="0.9"/>
      <circle cx="300" cy="280" r="130" fill="none" stroke="${light}" stroke-opacity="0.3" stroke-width="6"/>
      <text x="300" y="298" font-family="${font}" font-size="92" text-anchor="middle" dominant-baseline="middle">${artist.emoji}</text>
      <text x="300" y="468" font-family="'Space Mono',monospace" font-size="13" letter-spacing="4" fill="${light}" fill-opacity="0.7" text-anchor="middle">${artist.name.toUpperCase()}</text>
      <text x="300" y="530" font-family="'Space Mono',monospace" font-size="11" letter-spacing="2" fill="${light}" fill-opacity="0.4" text-anchor="middle">${artist.catalog} · LIMITED PRESSING</text>
    `;
  } else if(artist.sleeve.layout==='stripe'){
    let stripes='';
    const n=7;
    for(let i=0;i<n;i++){
      const h=600/n;
      const op=0.4+0.5*Math.abs(Math.sin(i*1.4+r3*4));
      stripes+=`<rect x="0" y="${i*h}" width="600" height="${h}" fill="${i%2===0?accent:dark}" fill-opacity="${op.toFixed(2)}"/>`;
    }
    body=`
      <rect width="600" height="600" fill="${dark}"/>
      <g>${stripes}</g>
      <rect x="0" y="0" width="600" height="600" fill="${dark}" fill-opacity="0.35"/>
      <g transform="rotate(-90 70 470)">
        <text x="70" y="470" font-family="${font}" font-weight="700" font-size="40" fill="${light}" letter-spacing="2">${artist.name.toUpperCase()}</text>
      </g>
      <text x="540" y="555" font-family="'Space Mono',monospace" font-size="13" fill="${light}" fill-opacity="0.55" text-anchor="end" letter-spacing="2">${artist.catalog}</text>
    `;
  } else { // gradient
    body=`
      <defs>
        <radialGradient id="g${seed}" cx="${40+r4*20}%" cy="${30+r2*20}%" r="75%">
          <stop offset="0%" stop-color="${lighten(accent,40)}"/>
          <stop offset="55%" stop-color="${accent}"/>
          <stop offset="100%" stop-color="${dark}"/>
        </radialGradient>
      </defs>
      <rect width="600" height="600" fill="url(#g${seed})"/>
      <g transform="rotate(${rot} 300 300)">
        <text x="300" y="280" font-family="${font}" font-style="italic" font-weight="600" font-size="58" fill="${light}" text-anchor="middle">${artist.name}</text>
      </g>
      <text x="300" y="540" font-family="'Space Mono',monospace" font-size="13" letter-spacing="4" fill="${light}" fill-opacity="0.65" text-anchor="middle">${artist.catalog}</text>
    `;
  }

  // shared finishing layer: fine grain + soft vignette + worn-edge frame
  return `<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" style="width:100%;height:100%;display:block;">
    ${body}
    <rect width="600" height="600" fill="url(#sleeveGrain)" opacity="0.5"/>
    <rect width="600" height="600" fill="none" stroke="#000" stroke-opacity="0.5" stroke-width="14"/>
  </svg>`;
}

// shared SVG grain filter, injected once
function ensureGrainDefs(){
  if(document.getElementById('sleeveGrainDefs')) return;
  const div=document.createElement('div');
  div.style.cssText='position:absolute;width:0;height:0;overflow:hidden;';
  div.innerHTML=`<svg id="sleeveGrainDefs"><defs>
    <filter id="grainFilter"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/></filter>
    <pattern id="sleeveGrain" patternUnits="userSpaceOnUse" width="600" height="600">
      <rect width="600" height="600" filter="url(#grainFilter)" opacity="0.18"/>
    </pattern>
  </defs></svg>`;
  document.body.appendChild(div);
}

function fallbackArt(artist){
  return `<div class="sleeve-art-fallback" style="background:radial-gradient(ellipse at 40% 40%, ${artist.color} 0%, ${artist.art} 70%)">${artist.emoji}</div>`;
}

function startExperience(){
  try{ audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  if(audioCtx && audioCtx.state==='suspended') audioCtx.resume();
  needleDrop();
  startAmbient();
  document.getElementById('tonearm').style.transform='rotate(-5deg)';
  document.getElementById('main-vinyl').style.animationDuration='2s';
  setTimeout(()=>{
    const l=document.getElementById('landing');
    l.style.opacity='0'; l.style.pointerEvents='none';
    setTimeout(()=>{ loadQuestion(0); document.getElementById('quiz').classList.add('active'); },400);
  },800);
}

function loadQuestion(idx){
  const q=questions[idx];
  const nums=['01','02','03','04','05','06','07'];
  document.getElementById('track-num').textContent='Track '+nums[idx];
  document.getElementById('side-label').textContent=idx<4?'Side A':'Side B';
  document.getElementById('q-eyebrow').textContent=q.eyebrow;
  document.getElementById('q-text').textContent=q.text;
  const grid=document.getElementById('answers-grid'); grid.innerHTML='';
  q.answers.forEach((ans,i)=>{
    const card=document.createElement('div'); card.className='answer-card';
    card.innerHTML=`<div class="answer-bg" style="--bg:${ans.bg}">${ans.emoji}</div><div class="answer-label"><div class="answer-label-text">${ans.label}</div></div><div class="answer-tick"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="#1A1614" stroke-width="1.5" stroke-linecap="round"/></svg></div>`;
    card.onclick=()=>pick(idx,i,card);
    grid.appendChild(card);
  });
  document.getElementById('mini-vinyl').style.animationDuration=Math.max(2,8-idx)+'s';
}

function pick(qIdx,aIdx,card){
  document.querySelectorAll('.answer-card').forEach(c=>c.classList.remove('selected'));
  card.classList.add('selected');
  click(820,0.04,0.07); crackle(0.035);
  artists.forEach(a=>{
    const vals=Object.values(a.profile)[qIdx]||[];
    const arr=Array.isArray(vals)?vals:[vals];
    if(arr.includes(aIdx)) scores[a.name]+=(arr.indexOf(aIdx)===0)?3:1;
  });
  setTimeout(()=>{
    if(qIdx<questions.length-1){ showTrans(()=>loadQuestion(qIdx+1)); }
    else { runAnticipation(); }
  },420);
}

function showTrans(cb){
  const t=document.getElementById('transition'); t.classList.add('show');
  setTimeout(()=>{ t.classList.remove('show'); cb&&cb(); },700);
}

function getTop(){
  let top=null,max=-1;
  for(const[n,s] of Object.entries(scores)) if(s>max){max=s;top=n;}
  return artists.find(a=>a.name===top)||artists[0];
}

// The reveal is the most important moment in the experience: it should
// never feel instant. This stages a short, cinematic build-up — the
// tonearm lowering onto the record, the crackle rising, a needle-drop
// flash — before the sleeve is even built, let alone shown.
function runAnticipation(){
  document.getElementById('quiz').style.opacity='0';
  setTimeout(()=>{
    document.getElementById('quiz').classList.remove('active');
    const a=document.getElementById('anticipation');
    const arm=document.getElementById('antic-tonearm');
    const txt=document.getElementById('antic-text');
    a.classList.add('show');
    txt.textContent='Side B is ending';

    let pop=setInterval(()=>{ if(!muted) crackle(0.025); },260);

    setTimeout(()=>{ txt.textContent='Cueing the needle'; },900);
    setTimeout(()=>{ arm.classList.add('down'); },1300);
    setTimeout(()=>{
      clearInterval(pop);
      needleDrop();
      document.getElementById('antic-flash').classList.add('flash');
    },2900);
    setTimeout(()=>{
      a.classList.remove('show');
      arm.classList.remove('down');
      document.getElementById('antic-flash').classList.remove('flash');
      showResult();
    },3500);
  },500);
}

function showResult(){
  document.getElementById('result').classList.add('active');
  currentArtist = getTop();
  buildResult(currentArtist);
  setTimeout(()=>document.getElementById('sleeve-reveal').classList.add('shown'),150);
  // Stagger the supporting details in after the sleeve has landed —
  // this is the part people screen-record, so let it breathe.
  staggerReveal();
}

function staggerReveal(){
  const els=document.querySelectorAll('#result-info .reveal-stagger');
  els.forEach((el,i)=>{
    setTimeout(()=>el.classList.add('in'), 900+i*260);
  });
}

function buildResult(artist){
  ensureGrainDefs();
  const art=document.getElementById('sleeve-art');
  try{ art.innerHTML = sleeveSVG(artist); }
  catch(e){ art.innerHTML = fallbackArt(artist); }

  document.getElementById('sleeve-name').innerHTML=
    `<div class="eyebrow">Your soul sounds like</div><h1>${artist.name}</h1>`;

  document.getElementById('result-info').innerHTML=`
    <div class="catalog-bar reveal-stagger">
      <div class="catalog-row"><span class="catalog-k">Pressing</span><span class="catalog-v">${artist.catalog}</span></div>
      <div class="catalog-divider"></div>
      <div class="catalog-row"><span class="catalog-k">Side</span><span class="catalog-v">B / 07</span></div>
      <div class="catalog-divider"></div>
      <div class="catalog-row"><span class="catalog-k">Mood</span><span class="catalog-v">${artist.traits[0]}</span></div>
    </div>
    <p class="result-desc reveal-stagger">${artist.desc}</p>
    <div class="result-traits reveal-stagger">${artist.traits.map(t=>`<span class="trait-pill">${t}</span>`).join('')}</div>
    <button class="share-btn reveal-stagger" onclick="openStory()">📸 Save for Instagram Story</button>
    <button class="retry-btn reveal-stagger" onclick="reset()">Drop the needle again</button>
  `;
}

// ─────────────────────────────────────────────
// INSTAGRAM STORY — pure canvas, matches each artist's sleeve direction
// ─────────────────────────────────────────────
function openStory(){
  const a = currentArtist; if(!a) return;
  const canvas = document.getElementById('story-canvas');
  const c = canvas.getContext('2d');
  canvas.width=540; canvas.height=960;
  c.clearRect(0,0,540,960);

  const bg=c.createLinearGradient(0,0,0,960);
  bg.addColorStop(0, a.art||'#1a1614');
  bg.addColorStop(0.55, blend(a.color||'#333333','#0d0a08',0.4));
  bg.addColorStop(1,'#0d0a08');
  c.fillStyle=bg; c.fillRect(0,0,540,960);

  const ra=c.createRadialGradient(270,360,0,270,360,320);
  ra.addColorStop(0,hexA(a.color||'#333333',0.5));
  ra.addColorStop(1,'transparent');
  c.fillStyle=ra; c.fillRect(0,0,540,960);

  const [vx,vy,vr]=[270,340,230];
  c.save();
  c.globalAlpha=0.22;
  c.fillStyle='#0d0b0a';
  c.beginPath(); c.arc(vx,vy,vr,0,Math.PI*2); c.fill();
  for(let r=28;r<vr-8;r+=6){
    c.beginPath(); c.arc(vx,vy,r,0,Math.PI*2);
    c.strokeStyle='rgba(255,255,255,0.055)'; c.lineWidth=0.7; c.stroke();
  }
  c.globalAlpha=0.12;
  const sheen=c.createLinearGradient(vx-vr,vy-vr,vx+vr,vy+vr);
  sheen.addColorStop(0,'rgba(196,168,130,1)');
  sheen.addColorStop(0.5,'transparent');
  sheen.addColorStop(1,'rgba(196,168,130,0.5)');
  c.fillStyle=sheen; c.beginPath(); c.arc(vx,vy,vr,0,Math.PI*2); c.fill();
  c.globalAlpha=1;
  const lgrad=c.createRadialGradient(vx-10,vy-10,5,vx,vy,68);
  lgrad.addColorStop(0,lighten(a.color||'#8B1A1A',30));
  lgrad.addColorStop(1,a.color||'#8B1A1A');
  c.fillStyle=lgrad;
  c.beginPath(); c.arc(vx,vy,68,0,Math.PI*2); c.fill();
  c.fillStyle='#1A1614'; c.beginPath(); c.arc(vx,vy,7,0,Math.PI*2); c.fill();
  c.restore();

  c.save(); c.font='48px serif'; c.textAlign='center'; c.textBaseline='middle';
  c.fillText(a.emoji, vx, vy); c.restore();

  c.save();
  for(let y=0;y<960;y+=2){
    for(let x=0;x<540;x+=2){
      if(Math.random()<0.007){
        c.fillStyle=`rgba(196,168,130,${Math.random()*0.055})`;
        c.fillRect(x,y,1,1);
      }
    }
  }
  c.restore();

  c.strokeStyle='rgba(196,168,130,0.18)'; c.lineWidth=0.5;
  c.beginPath(); c.moveTo(60,88); c.lineTo(480,88); c.stroke();
  c.beginPath(); c.moveTo(60,870); c.lineTo(480,870); c.stroke();

  c.textAlign='center';
  c.fillStyle='rgba(196,168,130,0.85)'; c.font='bold 13px monospace';
  c.fillText('A F T E R   H O U R S', 270, 52);
  c.fillStyle='rgba(242,235,217,0.3)'; c.font='italic 12px Georgia';
  c.fillText('Who are you after hours?', 270, 71);

  c.fillStyle='rgba(196,168,130,0.65)'; c.font='bold 11px monospace';
  c.fillText('YOUR SOUL SOUNDS LIKE', 270, 598);

  c.fillStyle='#F2EBD9';
  c.shadowColor='rgba(0,0,0,0.95)'; c.shadowBlur=28;
  let fs=78; c.font=`bold ${fs}px Georgia`;
  while(c.measureText(a.name).width>480 && fs>36){ fs-=4; c.font=`bold ${fs}px Georgia`; }
  c.fillText(a.name,270,662); c.shadowBlur=0;

  c.font='11px monospace'; c.fillStyle='rgba(196,168,130,0.45)';
  c.fillText(a.catalog+' · LIMITED PRESSING', 270,702);

  c.font='11px monospace'; c.fillStyle='rgba(196,168,130,0.4)';
  c.fillText(a.traits.join('  ·  '), 270, 748);

  storyImageUrl = canvas.toDataURL('image/png');
  document.getElementById('story-overlay').classList.add('show');
}

function hexA(hex,a){
  const r=parseInt(hex.slice(1,3),16)||0;
  const g=parseInt(hex.slice(3,5),16)||0;
  const b=parseInt(hex.slice(5,7),16)||0;
  return `rgba(${r},${g},${b},${a})`;
}
function blend(hex1,hex2,t){
  const r1=parseInt(hex1.slice(1,3),16)||0, g1=parseInt(hex1.slice(3,5),16)||0, b1=parseInt(hex1.slice(5,7),16)||0;
  const r2=parseInt(hex2.slice(1,3),16)||0, g2=parseInt(hex2.slice(3,5),16)||0, b2=parseInt(hex2.slice(5,7),16)||0;
  return `#${Math.round(r1+(r2-r1)*t).toString(16).padStart(2,'0')}${Math.round(g1+(g2-g1)*t).toString(16).padStart(2,'0')}${Math.round(b1+(b2-b1)*t).toString(16).padStart(2,'0')}`;
}
function lighten(hex,amt){
  try{
    let r=Math.min(255,parseInt(hex.slice(1,3),16)+amt);
    let g=Math.min(255,parseInt(hex.slice(3,5),16)+amt);
    let b=Math.min(255,parseInt(hex.slice(5,7),16)+amt);
    return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
  }catch(e){return hex;}
}

function downloadStory(){
  if(!storyImageUrl) return;
  const link=document.createElement('a');
  link.download=`after-hours-${(currentArtist.name||'result').replace(/\s+/g,'-').toLowerCase()}.png`;
  link.href=storyImageUrl;
  document.body.appendChild(link); link.click(); document.body.removeChild(link);
}
function closeStoryOverlay(){ document.getElementById('story-overlay').classList.remove('show'); }

function reset(){
  stopAmbient();
  artists.forEach(a=>scores[a.name]=0);
  currentArtist=null; storyImageUrl=null;
  document.getElementById('result').classList.remove('active');
  document.getElementById('sleeve-reveal').classList.remove('shown');
  document.getElementById('result-info').innerHTML='';
  document.getElementById('sleeve-art').innerHTML='';
  setTimeout(()=>{
    const l=document.getElementById('landing');
    l.style.opacity='1'; l.style.pointerEvents='all';
    document.getElementById('main-vinyl').style.animationDuration='18s';
    document.getElementById('tonearm').style.transform='rotate(-25deg)';
  },200);
}

ensureGrainDefs();
spawnDust();
</script>
